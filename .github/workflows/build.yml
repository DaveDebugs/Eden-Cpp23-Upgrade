name: Build Eden Emulator

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Vulkan SDK
      run: |
        choco install vulkan-sdk --no-progress
        $vulkanPath = (Get-ChildItem -Path "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName + "\Bin"
        echo "$vulkanPath" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      run: cmake --build build --config Release -j 4
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: eden-windows
        path: build/bin/
        
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-14 g++-14 libsdl2-dev libvulkan-dev build-essential cmake glslang-tools libxtst-dev libxcursor-dev libxi-dev libxrandr-dev libxss-dev xorg-dev qt6-base-dev qt6-base-private-dev libqt6svg6-dev libxkbcommon-dev libwayland-dev libqt6charts6-dev libavcodec-dev libavutil-dev libavformat-dev libswscale-dev libavfilter-dev
        
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSDL_X11_XTEST=OFF -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
      
    - name: Build
      run: cmake --build build --config Release -j 4
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: eden-linux
        path: build/bin/
